{% extends "products/base.html" %} {% block content %}
<div class="container mt-5 py-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div
        class="card shadow-lg border-0 overflow-hidden"
        style="border-radius: 0; background: #fff"
      >
        <div style="height: 6px; background: #ff3c38; width: 100%"></div>

        <div class="card-body p-5">
          <div class="text-center mb-4">
            <h2
              class="fw-black italic text-uppercase mb-1"
              style="font-weight: 900; font-style: italic; letter-spacing: -1px"
            >
              Join The <span style="color: #ff3c38">Roster</span>
            </h2>
            <p
              class="text-muted small text-uppercase fw-bold tracking-widest"
              style="letter-spacing: 2px"
            >
              Sign up for elite gear & exclusive drops
            </p>
          </div>

          <hr class="mb-4" style="opacity: 0.1" />

          <form
            method="POST"
            action="{% url 'account_signup' %}"
            class="ez-form"
          >
            {% csrf_token %}

            <div class="mb-3 signup-fields">{{ form.as_p }}</div>

            <button
              class="btn btn-danger btn-lg w-100 mt-4 fw-black text-uppercase shadow"
              type="submit"
              style="
                border-radius: 0;
                font-weight: 900;
                letter-spacing: 1px;
                padding: 15px;
              "
            >
              Complete Recruitment
            </button>
          </form>

          <div class="mt-4 text-center border-top pt-4">
            <p class="small text-muted mb-0">Already an elite member?</p>
            <a
              href="{% url 'account_login' %}"
              class="text-dark fw-bold text-decoration-none text-uppercase small"
              style="border-bottom: 2px solid #ff3c38"
              >Sign In to the Arena</a
            >
          </div>
        </div>
      </div>

      <div class="text-center mt-3">
        <a
          href="/"
          class="text-muted small text-decoration-none text-uppercase fw-bold"
          ><i class="bi bi-chevron-left"></i> Return to Training Grounds</a
        >
      </div>
    </div>
  </div>
</div>

<style>
  /* Custom Styling for Django Signup Form */
  .ez-form p {
    margin-bottom: 1.2rem;
  }

  .ez-form input {
    display: block;
    width: 100%;
    padding: 10px 15px;
    font-size: 0.95rem;
    color: #121212;
    background-color: #fcfcfc;
    border: 2px solid #ececec;
    border-radius: 0;
    transition: all 0.2s ease;
  }

  .ez-form input:focus {
    background-color: #fff;
    border-color: #ff3c38;
    outline: 0;
    box-shadow: none;
  }

  .ez-form label {
    font-weight: 800;
    text-transform: uppercase;
    font-size: 0.7rem;
    color: #121212;
    margin-bottom: 4px;
    display: block;
    letter-spacing: 0.5px;
  }

  /* Help text styling (e.g., password requirements) */
  .ez-form .helptext {
    display: block;
    font-size: 0.7rem;
    color: #999;
    margin-top: 4px;
    text-transform: none;
    font-weight: 400;
  }

  /* Error handling styling */
  .errorlist {
    list-style: none;
    padding: 0;
    margin: 0 0 10px 0;
    color: #ff3c38;
    font-size: 0.75rem;
    font-weight: bold;
    text-transform: uppercase;
  }

  .fw-black {
    font-weight: 900;
  }
  .italic {
    font-style: italic;
  }
</style>
{% endblock %}
