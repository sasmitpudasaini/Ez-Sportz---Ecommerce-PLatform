{% extends "products/base.html" %}

{% block content %}
<div class="container mt-5">
    <div class="row">
        <div class="col-md-7">
            <div class="card shadow-sm border-0 p-4">
                <h4 class="fw-bold mb-4 text-uppercase">Shipping & Payment Details</h4>
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="row g-3">
                       ...
<div class="col-12">
    <label class="form-label">Full Name</label>
    <input type="text" class="form-control" name="full_name" value="{{ user.username }}">
</div>
...
                        <div class="col-12">
                            <label class="form-label">Delivery Address</label>
                            {{ form.address }}
                        </div>
                        
                        <div class="col-12">
                            <label class="form-label">Payment Method</label>
                            {{ form.payment_method }}
                        </div>
                    </div>
                    
                    <hr class="my-4">
                    <button class="btn btn-primary btn-lg w-100 fw-bold" type="submit">Place Order</button>
                </form>
            </div>
        </div>

        <div class="col-md-5">
            <div class="card bg-light border-0 p-4">
                <h5 class="fw-bold mb-3">Order Summary</h5>
                <div class="d-flex justify-content-between mb-2">
                    <span>Subtotal</span>
                    <span>${{ total|floatformat:2 }}</span>
                </div>
                <div class="d-flex justify-content-between mb-2">
                    <span>Shipping</span>
                    <span class="text-success">FREE</span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold fs-5">
                    <span>Total</span>
                    <span class="text-primary">${{ total|floatformat:2 }}</span>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
